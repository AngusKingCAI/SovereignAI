<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SovereignAI</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="app-header">
        <h1>SovereignAI</h1>
        <div id="connection-status">Connecting...</div>
    </div>

    <div id="main-content">
        <h2>Capabilities</h2>
        <ul id="capability-list"></ul>
    </div>

    <div id="task-section">
        <h2>Submit Task</h2>
        <form id="task-form">
            <div>
                <label for="category">Category:</label>
                <select id="category" name="category" required>
                    <option value="tool">Tool</option>
                    <option value="model_inference">Model Inference</option>
                    <option value="memory">Memory</option>
                    <option value="communication">Communication</option>
                </select>
            </div>
            <div>
                <label for="capability_name">Capability Name:</label>
                <input type="text" id="capability_name" name="capability_name" required>
            </div>
            <div>
                <label for="payload">Payload:</label>
                <textarea id="payload" name="payload" rows="5" required></textarea>
            </div>
            <button type="submit">Submit Task</button>
        </form>
    </div>

    <div id="task-status">
        <h2>Task Status</h2>
        <div id="task-status-content">No task submitted</div>
    </div>

    <div id="log-drawer">
        <button id="log-toggle">Toggle Logs</button>
        <div id="log-content"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
