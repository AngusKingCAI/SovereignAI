repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-all]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        # Explicit exclusions rather than relying on [tool.bandit] auto-discovery
        # (version-dependent). Per Kimi M3 Round Table finding.
        args: ["-r", ".", "-ll", "-x", ".venv,venv,env,.git,node_modules,__pycache__,build,dist,.tox,.eggs,.pytest_cache,.mypy_cache,.ruff_cache,htmlcov"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', 'txt/.secrets.baseline']

  - repo: local
    hooks:
      - id: component-manifest-kwargs
        name: ComponentManifest keyword arguments check
        entry: python scripts/check_component_manifest_kwargs.py
        language: system
        types: [python]
