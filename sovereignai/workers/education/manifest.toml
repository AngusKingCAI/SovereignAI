[component]
component_id = "teacher_worker"
name = "Teacher Worker"
version = "0.1.0"
author = "user"
content_hash = "<computed at /close>"
department = "education"
core = false

[[provides]]
category = "model_improvement"
name = "finetune"
interface = """
def finetune(base_model: str, dataset: list, output_name: str) -> str
"""

[[provides]]
category = "model_improvement"
name = "evaluate"
interface = """
def evaluate(model_path: str, dataset: list) -> dict
"""

[[provides]]
category = "model_improvement"
name = "curate_dataset"
interface = """
def curate_dataset(trace_ids: list[str], criteria: dict, consent: bool) -> list
"""

[[requires]]
category = "trace"
name = "emit"

[[requires]]
category = "memory"
name = "query"
