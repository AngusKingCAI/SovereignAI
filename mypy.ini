[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
ignore_missing_imports = True
exclude = app/services|app/sovereignai/observability|app/sovereignai/orchestrator|app/sovereignai/indexing|app/web|app/tui

[mypy-sovereignai.shared.trace_emitter]
ignore_errors = True

[mypy-app.web.*]
ignore_errors = True

[mypy-app.tui.*]
ignore_errors = True
